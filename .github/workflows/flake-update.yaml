name: Weekly Flake Update

on:
  schedule:
    - cron: "0 0 * * 0"
  workflow_dispatch:

jobs:
  update:
    name: Update flake inputs
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.changes.outputs.changed }}
    steps:
      - uses: actions/checkout@v6

      - name: Remove bloat
        uses: wimpysworld/nothing-but-nix@main

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            auto-optimise-store = true
            substituters = https://cache.nixos.org https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCUSeBs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Update flake inputs
        run: nix flake update

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet flake.lock; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Upload flake.lock
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flake_lock
          path: flake.lock

  build:
    name: Check and build
    needs: update
    if: needs.update.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download flake.lock
        uses: actions/download-artifact@v4
        with:
          name: flake_lock

      - name: Remove bloat
        uses: wimpysworld/nothing-but-nix@main

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: |
            auto-optimise-store = true
            substituters = https://cache.nixos.org https://nix-community.cachix.org
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= nix-community.cachix.org-1:mB9FSh9qf2dCimDSUo8Zy7bkq5CX+/rkCWyvRCUSeBs=

      - name: Setup Cachix
        uses: cachix/cachix-action@v14
        with:
          name: ${{ secrets.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Run flake check
        run: nix flake check --keep-going

      - name: Build system
        run: |
          nix build .#nixosConfigurations.satella.config.system.build.toplevel \
            --no-link \
            --keep-going \
            --print-build-logs \
            --show-trace

  create_pr:
    name: Create and merge PR
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download flake.lock
        uses: actions/download-artifact@v4
        with:
          name: flake_lock

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch and commit
        id: commit
        run: |
          BRANCH="flake-update/${{ github.run_id }}"
          git switch -c "$BRANCH"
          git add flake.lock
          git commit -m "flake: update inputs $(date +%Y-%m-%d)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT

      - name: Push branch
        run: git push -u origin ${{ steps.commit.outputs.branch }}

      - name: Create PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr view ${{ steps.commit.outputs.branch }} \
          || gh pr create \
            --title "flake: update inputs $(date +%Y-%m-%d)" \
            --body "Automated weekly flake update." \
            --base master \
            --head ${{ steps.commit.outputs.branch }}

      - name: Auto-merge PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge \
            --merge \
            --auto \
            --delete-branch \
            ${{ steps.commit.outputs.branch }}
