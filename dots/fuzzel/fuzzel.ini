[main]
font=JetBrainsMono Nerd Font Propo:size=10
icon-theme=Papirus
icons-enabled=yes
prompt="❯ "
width=38
lines=7
horizontal-pad=24
vertical-pad=18
inner-pad=10
line-height=32
letter-spacing=0
dpi-aware=yes
show-actions=no
layer=overlay
terminal=wezterm
match-mode=fuzzy

[colors]
background=303446dd
text=c6d0f5ff
prompt=f4b8e4ff
placeholder=838ba7ff
input=c6d0f5ff
match=f4b8e4ff
selection=f4b8e4ff
selection-text=303446ff
selection-match=303446ff
counter=838ba7ff
border=f4b8e4ff

[border]
radius=14
width=2

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
delete-prev=BackSpace
delete-next=Delete
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
